services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ask-my-docs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgrag
    ports:
      - "5432:5432"
    volumes:
      - pgrag_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../../apps/backend
    container_name: ask-my-docs-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pgrag
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../../apps/frontend
    container_name: ask-my-docs-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgrag_data:
